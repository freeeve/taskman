<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>taskman</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header>
  <h1>taskman</h1>
  <nav class="tabs">
    <button id="tab-tasks" class="active">tasks</button>
    <button id="tab-features">features</button>
    <button id="tab-activity">activity</button>
    <button id="tab-decisions">decisions</button>
  </nav>
  <div class="picker">
    <button id="project-button" title="switch project (ctrl+k)"></button>
    <div id="picker-panel" hidden>
      <input id="picker-search" type="search" placeholder="find a project..." autocomplete="off">
      <ul id="picker-list"></ul>
    </div>
  </div>
  <select id="project" hidden></select>
  <select id="lane" title="lane"><option value="">all lanes</option></select>
  <label class="toggle"><input type="checkbox" id="show-deferred"> deferred</label>
  <label class="toggle"><input type="checkbox" id="swimlanes"> swimlanes</label>
  <button id="new-task" title="new task">+ task</button>
  <button id="undo" title="undo the last change in this project">undo</button>
  <button id="decisions-pill" class="decisions-pill" hidden title="show tasks waiting on a decision"></button>
  <div class="searchbox">
    <input id="search" type="search" placeholder="search all projects... ( / )" autocomplete="off">
    <div id="search-results" hidden></div>
  </div>
</header>
<main id="board"></main>
<main id="features" hidden></main>
<main id="activity" hidden></main>
<main id="decisions" hidden></main>
<dialog id="task-dialog">
  <div class="dialog-head">
    <span id="dialog-file" class="mono"></span>
    <button id="dialog-close" title="close">&#10005;</button>
  </div>
  <article id="dialog-body" class="md"></article>
  <div id="dialog-actions" class="dialog-actions"></div>
  <div class="dialog-hint">paste or drop an image to attach a screenshot</div>
</dialog>
<script src="/static/board.js"></script>
<script src="/static/features.js"></script>
<script src="/static/activity.js"></script>
<script src="/static/decisions.js"></script>
<script src="/static/router.js"></script>
<script src="/static/search.js"></script>
</body>
</html>
